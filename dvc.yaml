# DVC Pipeline Configuration
# 
# Note: This is optional. The core reproducibility works through:
# 1. Data versioning (SHA-256 hashing in data_versioning.py)
# 2. Code versioning (git commits)
# 3. Experiment tracking (MLflow)
#
# DVC is useful for:
# - Tracking large data files (dvc add data/file.csv)
# - Remote storage (S3, GCS, etc.)
# - Team collaboration on data
#
# For this project, reproducibility doesn't require DVC pipelines.
# Just use: git checkout <commit> && python3 train.py

stages:
  # Optional: Define training as a DVC stage for pipeline reproducibility
  train:
    cmd: python3 train.py
    deps:
      - pipelines
      - models
      - features
      - data_sources
    params:
      - config
    metrics:
      - outputs/metrics.json:
          cache: false
    outs:
      - outputs/predictions.csv
