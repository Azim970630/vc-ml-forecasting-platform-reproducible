# DVC Data Versioning Configuration
#
# Track input data files only (not outputs)
# Outputs are generated fresh during reproduction
#
# For reproducibility:
# 1. Input data is tracked with DVC (restored from remote)
# 2. Code is versioned in git (restored with git checkout)
# 3. Outputs are generated fresh by training (ensures consistency)
#
# Input files are tracked with: dvc add data/raw/sales_data.csv
# DVC pipelines (dvc repro) are not used in this project
